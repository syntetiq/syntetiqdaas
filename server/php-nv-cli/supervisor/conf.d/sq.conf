[supervisord]
nodaemon=true                   ; Run supervisord in the foreground
# logfile=/dev/stdout             ; Redirect supervisord logs to stdout
# logfile_maxbytes=0              ; Disable log rotation for supervisord logs

[program:oro_web_socket]
command=php ./bin/console gos:websocket:server
numprocs=1
autostart=true
autorestart=true
directory=/data
user=www-data
startsecs=10
environment=HOME="/var/www",USER="www-data"
# redirect_stderr=true
stdout_logfile=/dev/stdout       ; Redirect program stdout to console
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr       ; Redirect program stderr to console
stderr_logfile_maxbytes=0

[program:oro_message_consumer]
command=php ./bin/console oro:message-queue:consume
process_name=%(program_name)s_%(process_num)02d
numprocs=1
autostart=true
autorestart=true
startretries=100
directory=/data
user=www-data
environment=HOME="/var/www",USER="www-data"
startsecs=10
# redirect_stderr=true
stdout_logfile=/dev/stdout       ; Redirect program stdout to console
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr       ; Redirect program stderr to console
stderr_logfile_maxbytes=0

# php bin/console oro:message-queue:transport:consume oro.default SyntetiQ\\Bundle\\ModelBundle\\Async\\ExportDataSetProcessor

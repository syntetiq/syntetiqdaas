imports:
    - { resource: config.yml }

parameters:
    main_log_channels: []

doctrine:
    dbal:
        logging:            true

monolog:
    handlers:
        filtered:
            type: filter
            min_level: info
            handler: main
            channels: '%main_log_channels%' # The channels configuration only works for top-level handlers
        main:
            type: fingers_crossed
            action_level: error
            handler: grouped
            buffer_size:    100
            excluded_http_codes: [ 404, 405 ]
        grouped:
            type: group
            members: [streamed, deduplicated]

        streamed:
            type:           stream
            path:           "%log_path%"
            level:          debug

        deduplicated:
            type:           deduplication
            handler:        symfony_mailer
            time:           10
            store:          "%kernel.logs_dir%/deduplicated.log"

        symfony_mailer:
            type:           symfony_mailer
            email_prototype:
                id:         oro_logger.monolog.email_factory.error_log_notification
                method:     createEmail
            level:          debug
            formatter:      monolog.formatter.html

synteti_q_model:
    environments:
        - conda
        - system
        - venv
    engines:
        ultralytics:
            name: Ultralytics
            python_version: '3.10.12'
            dataset_format: yolo
            dataset_split: train-valid-test
            dataset_box_format: xyxy
            models:
                - 'yolo26n'
                - 'yolo26s'
                - 'yolo26m'
                - 'yolo26l'
                - 'yolo26x'
                - 'yolo11n'
                - 'yolo11s'
                - 'yolo11m'
                - 'yolo11l'
                - 'yolo11x'
                - 'yolo8n'
                - 'yolo8s'
                - 'yolo8m'
                - 'yolo8l'
                - 'yolo8x'
        pytorch_ssd_jetson:
            name: Pytorch SSD
            python_version: '3.9.17'
            dataset_format: pascal-voc
            dataset_split: train-valid-test
            dataset_box_format: xyxy
            models:
                - 'mb1-ssd'
                - 'mb1-ssd-lite'
                - 'mb2-ssd-lite'
                - 'vgg16-ssd'
